# ============================================================
# Configuracion central - Deteccion de armas (YOLOv8)
# Hardware entrenamiento: RTX 5050 Laptop (8 GB)
# Despliegue:             Raspberry Pi 5
# Clases finales: knife / handgun / long_gun
# ============================================================

model:
  name: "yolov8s.pt"
  image_size: 640

classes:
  - "knife"
  - "handgun"
  - "long_gun"     # rifles + escopetas

dataset:
  # Open Images v7: clases leaf usadas para descarga (script 1)
  open_images_classes:
    - "Knife"
    - "Handgun"
    - "Shotgun"
    - "Rifle"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  max_samples_per_class: 3500

training:
  output_dir: "models/yolov8_weapons"
  project_name: "weapons"
  run_name: "yolov8s_v2"
  epochs: 100
  batch: 8                          # bajado para evitar OOM al final del run
  workers: 4                        # bajado para liberar RAM
  device: 0
  optimizer: "AdamW"
  lr0: 0.001
  patience: 30                      # mas paciencia con dataset mas grande
  amp: true
  cache: false
  seed: 42
  fliplr: 0.5
  flipud: 0.0
  mosaic: 1.0
  mixup: 0.20                       # subido: más combinaciones de imágenes
  copy_paste: 0.5                   # subido: más pegado de armas en otros fondos
  degrees: 25                       # NUEVO: rotación hasta 25° (armas en cualquier ángulo)
  translate: 0.15                   # NUEVO: traslación ±15% (objetos en cualquier posición del frame)
  scale: 0.6                        # NUEVO: escala ±60% (armas cerca/lejos)
  shear: 5                          # NUEVO: cizalla 5° (perspectivas)
  perspective: 0.0005               # NUEVO: deformación de perspectiva ligera
  hsv_h: 0.02                       # subido: más variación de tono
  hsv_s: 0.8                        # subido: más saturación
  hsv_v: 0.5                        # subido: más variación de brillo (luz/sombra)

inference:
  weights: "runs/detect/models/yolov8_weapons/weapons/yolov8s_v4_pose_negs/weights/best.pt"
  confidence_threshold: 0.30      # base
  class_thresholds:               # umbral específico por clase
    knife:    0.40                # con dataset HF debería detectar mejor knife
    handgun:  0.45
    long_gun: 0.45
  iou_threshold: 0.45
  camera_index: 0
  display_fps: true
  alert_cooldown_seconds: 1.0    # 1s entre beeps para no saturar
  imgsz: 640

plausibility:
  min_area_ratio: 0.002           # caja < 0.2% del frame → descartada
  max_area_ratio: 0.55            # caja > 55% del frame → descartada

# Para la Pi5 se entrena un YOLOv8n con el mismo dataset y se exporta a ONNX INT8
export:
  model: "yolov8n.pt"
  run_name: "yolov8n_v4_pose_negs"
  imgsz: 416
  epochs: 80
  batch: 16
  formats:
    - "onnx"
    - "ncnn"
  half: false
  simplify: true
  opset: 12
  int8: true                        # cuantizacion INT8 al exportar (ONNX)
  output_dir: "models/export"

alerts:
  sound_enabled: true               # beep sintético generado en runtime (no requiere wav)
  sound_file: "assets/alert.wav"
  log_detections: true
  log_file: "logs/detections.log"
  log_json: true                    # log estructurado JSON (para análisis)
  log_json_file: "logs/detections.jsonl"
  save_frames: true
  frames_dir: "logs/frames"
  # Video clip: graba los últimos N segundos + M segundos post-detección
  video_clip_enabled: true
  video_clip_pre_seconds: 5         # segundos antes de la detección (ring buffer)
  video_clip_post_seconds: 10       # segundos después de la primera detección
  video_clip_dir: "logs/clips"
  # Telegram: notificación push con foto al detectar arma
  telegram_enabled: false           # activar cuando tengas bot token
  telegram_bot_token: ""            # token de @BotFather
  telegram_chat_id: ""              # chat_id destino (tu usuario o grupo)
  telegram_cooldown_seconds: 30     # mínimo entre mensajes Telegram

dashboard:
  enabled: true                     # dashboard web para monitoreo remoto
  port: 8080                        # puerto HTTP (acceder desde LAN: http://<ip>:8080)
  fps_limit: 15                     # FPS máx del stream MJPEG (bajar para ahorrar ancho de banda)
